<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }

    p {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }

    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      color: #111;
    }

    input[type="email"]:focus {
      border-color: #c0392b;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 13px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #c0392b;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #a93226;
    }

    .note {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Delete Account</h1>
    <p>Enter your account email below. We'll open your email client with a pre-filled deletion request.</p>

    <form id="deleteForm">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
      <button type="submit">Request account deletion</button>
    </form>

    <p class="note">Your request will be processed within 30 days.</p>
  </div>

  <script>
    document.getElementById('deleteForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var to = 'gabriellafonso.dev@gmail.com';
      var subject = encodeURIComponent('Account Deletion Request');
      var body = encodeURIComponent('Please delete my account associated with this email: ' + email);
      window.location.href = 'mailto:' + to + '?subject=' + subject + '&body=' + body;
    });
  </script>
</body>
</html>
